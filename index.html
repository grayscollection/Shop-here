<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAY COLLECTION</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #fff5f8; padding-bottom: 140px; }
        header { background: #d63384; color: white; padding: 20px; text-align: center; }
        
        #shop-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; padding: 15px; 
        }

        .product-card { 
            background: white; border-radius: 12px; overflow: hidden; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; padding-bottom: 15px;
        }

        .product-card img { width: 100%; height: 180px; object-fit: cover; border-bottom: 2px solid #fdf2f2; }
        .product-card h3 { font-size: 14px; margin: 10px 5px; color: #444; text-transform: uppercase; }
        .product-card .price-tag { color: #d63384; font-weight: bold; margin-bottom: 8px; display: block; font-size: 16px; }

        /* Color & Size Dropdowns */
        .option-select {
            width: 85%;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 12px;
            background: #fff;
            color: #333;
        }

        .qty-row { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 10px auto;
            background: #f8f8f8;
            width: 80%;
            border-radius: 8px;
            padding: 5px;
        }
        
        .btn-plus-minus { 
            background: #d63384; 
            color: white; 
            border: none; 
            width: 35px; 
            height: 35px; 
            border-radius: 4px; 
            font-size: 22px; 
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }

        .number-display { font-size: 18px; font-weight: bold; margin: 0 15px; color: #333; }
        
        .add-to-cart-btn {
            background-color: #333; color: white; border: none;
            padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 85%;
            font-size: 11px; letter-spacing: 1px;
        }

        .order-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; padding: 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; gap: 10px; z-index: 9999;
        }
        
        .order-total-text { font-weight: bold; font-size: 16px; color: #d63384; display: flex; justify-content: space-between; }
        
        .final-order-btn {
            background-color: #25D366; color: white; text-decoration: none;
            padding: 16px; border-radius: 8px; font-weight: bold; text-align: center;
            font-size: 18px; display: block;
        }

        .clear-cart { color: #999; text-align: right; font-size: 12px; border: none; background: none; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>GRAY'S COLLECTION</h1>
</header>

<div id="shop-grid">
    <p id="loading">Updating products...</p>
</div>

<div class="order-bar" id="order-bar" style="display: none;">
    <div class="order-total-text">
        <span>Items: <span id="cart-count">0</span></span>
        <span>Total: ₦<span id="cart-total">0</span></span>
    </div>
    <a href="#" class="final-order-btn" id="wa-link" target="_blank">ORDER NOW</a>
    <button class="clear-cart" onclick="emptyShopCart()">Clear Selection</button>
</div>

<script>
    const PROJECT_ID = "q044uw50";
    const DATASET = "production";
    const WHATSAPP_NUMBER = "2349133269825"; 

    let cartData = [];

    function adjustQty(id, amount) {
        const display = document.getElementById(`qty-num-${id}`);
        let current = parseInt(display.innerText);
        current += amount;
        if(current < 1) current = 1;
        display.innerText = current;
    }

    function addItemToCart(name, price, id) {
        const selectedQty = parseInt(document.getElementById(`qty-num-${id}`).innerText);
        const selectedSize = document.getElementById(`size-${id}`) ? document.getElementById(`size-${id}`).value : "N/A";
        const selectedColor = document.getElementById(`color-${id}`) ? document.getElementById(`color-${id}`).value : "N/A";
        
        // Check if item with SAME size and color exists
        const itemExists = cartData.find(i => i.name === name && i.size === selectedSize && i.color === selectedColor);
        
        if(itemExists) {
            itemExists.qty += selectedQty;
        } else {
            cartData.push({ name, price, qty: selectedQty, size: selectedSize, color: selectedColor });
        }
        
        document.getElementById(`qty-num-${id}`).innerText = "1";
        refreshOrderBar();
    }

    function emptyShopCart() {
        cartData = [];
        document.getElementById('order-bar').style.display = 'none';
        refreshOrderBar();
    }

    function refreshOrderBar() {
        const bar = document.getElementById('order-bar');
        const countTxt = document.getElementById('cart-count');
        const totalTxt = document.getElementById('cart-total');
        const waLink = document.getElementById('wa-link');

        if (cartData.length > 0) bar.style.display = 'flex';

        let grandTotal = 0;
        let totalItems = 0;
        let textMessage = "Hello GRAY COLLECTION! I want to place an order:\n\n";
        
        cartData.forEach((item) => {
            let lineTotal = item.price * item.qty;
            grandTotal += lineTotal;
            totalItems += item.qty;
            textMessage += `• ${item.name}\n  Size: ${item.size} | Color: ${item.color}\n  (${item.qty} pcs) - ₦${lineTotal.toLocaleString()}\n\n`;
        });

        textMessage += `*GRAND TOTAL: ₦${grandTotal.toLocaleString()}*`;
        
        countTxt.innerText = totalItems;
        totalTxt.innerText = grandTotal.toLocaleString();
        waLink.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(textMessage)}`;
    }

    async function getProducts() {
        try {
            // Updated Query to fetch colors and sizes
            const res = await fetch(`https://${PROJECT_ID}.api.sanity.io/v2021-10-21/data/query/${DATASET}?query=${encodeURIComponent('*[_type == "product"]{_id, name, price, colors, sizes, "imageUrl": image.asset->url}')}`);
            const json = await res.json();
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = ""; 

            json.result.forEach(p => {
                const uniqueId = p._id.replace(/[^a-zA-Z0-9]/g, '');
                
                // Convert comma strings into arrays
                const sizeList = p.sizes ? p.sizes.split(',').map(s => s.trim()) : [];
                const colorList = p.colors ? p.colors.split(',').map(c => c.trim()) : [];

                let sizeSelect = p.sizes ? `<select id="size-${uniqueId}" class="option-select">` + sizeList.map(s => `<option value="${s}">${s}</option>`).join('') + `</select>` : '';
                let colorSelect = p.colors ? `<select id="color-${uniqueId}" class="option-select">` + colorList.map(c => `<option value="${c}">${c}</option>`).join('') + `</select>` : '';

                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${p.imageUrl}" alt="product">
                        <h3>${p.name}</h3>
                        <span class="price-tag">₦${p.price.toLocaleString()}</span>
                        
                        ${sizeSelect}
                        ${colorSelect}

                        <div class="qty-row">
                            <button class="btn-plus-minus" onclick="adjustQty('${uniqueId}', -1)">-</button>
                            <span class="number-display" id="qty-num-${uniqueId}">1</span>
                            <button class="btn-plus-minus" onclick="adjustQty('${uniqueId}', 1)">+</button>
                        </div>
                        
                        <button class="add-to-cart-btn" onclick="addItemToCart('${p.name}', ${p.price}, '${uniqueId}')">ADD TO ORDER</button>
                    </div>`;
            });
        } catch (e) { document.getElementById('loading').innerText = "Check network..."; }
    }

    getProducts();
</script>

</body>
</html>
