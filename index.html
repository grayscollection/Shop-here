<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAY COLLECTION</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fff5f8; }
        header { background: #d63384; color: white; padding: 20px; text-align: center; }
        
        #shop-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; 
            padding: 20px; 
        }

        .product-card { 
            background: white; 
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            padding-bottom: 15px;
        }

        .product-card img { width: 100%; height: 200px; object-fit: cover; }
        .product-card h3 { font-size: 16px; margin: 10px 0 5px; color: #333; }
        .product-card .price-tag { color: #d63384; font-weight: bold; margin-bottom: 10px; display: block; }

        /* Quantity Selector Styling */
        .qty-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            gap: 10px;
        }
        .qty-btn {
            background: #eee;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
        }
        .qty-number { font-weight: bold; min-width: 20px; }

        .order-btn {
            display: inline-block;
            background-color: #25D366; 
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 13px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>GRAY'S COLLECTION</h1>
</header>

<div id="shop-grid">
    <p id="loading">Loading products...</p>
</div>

<script>
    const PROJECT_ID = "q044uw50";
    const DATASET = "production";
    const WHATSAPP_NUMBER = "2349133269825"; 

    const QUERY = encodeURIComponent('*[_type == "product"]{_id, name, price, "imageUrl": image.asset->url}');
    const URL = `https://${PROJECT_ID}.api.sanity.io/v2021-10-21/data/query/${DATASET}?query=${QUERY}`;

    // Function to update the WhatsApp link based on quantity
    function updateOrderLink(id, name, basePrice) {
        const qty = document.getElementById(`qty-${id}`).innerText;
        const total = basePrice * qty;
        const btn = document.getElementById(`btn-${id}`);
        
        const message = encodeURIComponent(`Hello! I want to order ${qty} pieces of: ${name}. \nTotal Price: ₦${total.toLocaleString()}`);
        btn.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;
    }

    // Function to increase/decrease quantity
    function changeQty(id, delta, name, basePrice) {
        const qtyElement = document.getElementById(`qty-${id}`);
        let currentQty = parseInt(qtyElement.innerText);
        currentQty += delta;
        
        if (currentQty < 1) currentQty = 1; // Minimum 1 item
        
        qtyElement.innerText = currentQty;
        updateOrderLink(id, name, basePrice);
    }

    async function fetchDresses() {
        try {
            const response = await fetch(URL);
            const data = await response.json();
            const grid = document.getElementById('shop-grid');
            
            if (data.result.length === 0) {
                grid.innerHTML = "<p>No products found.</p>";
                return;
            }

            grid.innerHTML = ""; 

            data.result.forEach(dress => {
                const id = dress._id.replace(/[^a-zA-Z0-9]/g, ''); // Clean ID for HTML
                const initialMsg = encodeURIComponent(`Hello! I want to order 1 piece of: ${dress.name}. \nTotal Price: ₦${dress.price.toLocaleString()}`);
                
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${dress.imageUrl}" alt="${dress.name}">
                        <h3>${dress.name}</h3>
                        <span class="price-tag">₦${dress.price.toLocaleString()}</span>
                        
                        <div class="qty-container">
                            <button class="qty-btn" onclick="changeQty('${id}', -1, '${dress.name}', ${dress.price})">-</button>
                            <span class="qty-number" id="qty-${id}">1</span>
                            <button class="qty-btn" onclick="changeQty('${id}', 1, '${dress.name}', ${dress.price})">+</button>
                        </div>

                        <a href="https://wa.me/${WHATSAPP_NUMBER}?text=${initialMsg}" 
                           id="btn-${id}" 
                           class="order-btn" 
                           target="_blank">ORDER NOW</a>
                    </div>
                `;
            });
        } catch (error) {
            console.error("Error:", error);
            document.getElementById('loading').innerText = "Failed to load shop.";
        }
    }

    fetchDresses();
</script>

</body>
</html>
