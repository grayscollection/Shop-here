<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAY COLLECTION</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fff5f8; }
        header { background: #d63384; color: white; padding: 20px; text-align: center; }
        
        #shop-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; 
            padding: 20px; 
        }

        .product-card { 
            background: white; 
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            padding-bottom: 15px;
        }

        .product-card img { width: 100%; height: 200px; object-fit: cover; }
        .product-card h3 { font-size: 16px; margin: 10px 0 5px; color: #333; }
        .product-card p { color: #d63384; font-weight: bold; margin-bottom: 10px; }

        /* The WhatsApp Button Style */
        .order-btn {
            display: inline-block;
            background-color: #25D366; /* WhatsApp Green */
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .order-btn:hover { background-color: #128C7E; }
    </style>
</head>
<body>

<header>
    <h1>GRAY'S COLLECTION</h1>
</header>

<div id="shop-grid">
    <p id="loading">Loading products...</p>
</div>

<script>
    const PROJECT_ID = "q044uw50";
    const DATASET = "production";
    
    // REPLACE THIS with the lady's real phone number (include 234)
    const WHATSAPP_NUMBER = "2349133269825"; 

    const QUERY = encodeURIComponent('*[_type == "product"]{name, price, "imageUrl": image.asset->url}');
    const URL = `https://${PROJECT_ID}.api.sanity.io/v2021-10-21/data/query/${DATASET}?query=${QUERY}`;

    async function fetchDresses() {
        try {
            const response = await fetch(URL);
            const data = await response.json();
            const grid = document.getElementById('shop-grid');
            
            if (data.result.length === 0) {
                grid.innerHTML = "<p>No products found.</p>";
                return;
            }

            grid.innerHTML = ""; 

            data.result.forEach(dress => {
                // This creates the custom message
                const message = encodeURIComponent(`Hello! I want to order this: ${dress.name} for ₦${dress.price.toLocaleString()}`);
                const waLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;

                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${dress.imageUrl}" alt="${dress.name}">
                        <h3>${dress.name}</h3>
                        <p>₦${dress.price.toLocaleString()}</p>
                        <a href="${waLink}" class="order-btn" target="_blank">ORDER NOW</a>
                    </div>
                `;
            });
        } catch (error) {
            console.error("Error loading products:", error);
            document.getElementById('loading').innerText = "Failed to load shop.";
        }
    }

    fetchDresses();
</script>

</body>
</html>
