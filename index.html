<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAY COLLECTION</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fff5f8; padding-bottom: 120px; }
        header { background: #d63384; color: white; padding: 20px; text-align: center; }
        
        #shop-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; padding: 20px; 
        }

        .product-card { 
            background: white; border-radius: 10px; overflow: hidden; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; padding-bottom: 15px;
        }

        .product-card img { width: 100%; height: 180px; object-fit: cover; }
        .product-card h3 { font-size: 15px; margin: 10px 0 5px; color: #333; }
        .product-card .price-tag { color: #d63384; font-weight: bold; margin-bottom: 10px; display: block; }

        /* Quantity Controls */
        .qty-box { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .qty-btn { background: #f0f0f0; border: none; width: 25px; height: 25px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        
        .add-btn {
            background-color: #d63384; color: white; border: none;
            padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 80%;
        }

        /* Cart Bar */
        .cart-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; padding: 15px 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }
        .cart-row { display: flex; justify-content: space-between; align-items: center; }
        .cart-info { font-weight: bold; font-size: 14px; }
        
        .checkout-btn {
            background-color: #25D366; color: white; text-decoration: none;
            padding: 12px; border-radius: 8px; font-weight: bold; text-align: center;
        }
        .clear-btn { color: #888; font-size: 12px; background: none; border: none; text-decoration: underline; }
    </style>
</head>
<body>

<header>
    <h1>GRAY'S COLLECTION</h1>
</header>

<div id="shop-grid">
    <p id="loading">Loading products...</p>
</div>

<div class="cart-bar" id="cart-bar" style="display: none;">
    <div class="cart-row">
        <div class="cart-info">Items: <span id="cart-count">0</span> | Total: ₦<span id="cart-total">0</span></div>
        <button class="clear-btn" onclick="clearCart()">Clear All</button>
    </div>
    <a href="#" class="checkout-btn" id="whatsapp-checkout" target="_blank"ORDER NOW</a>
</div>

<script>
    const PROJECT_ID = "q044uw50";
    const DATASET = "production";
    const WHATSAPP_NUMBER = "2349133269825"; 

    let cart = [];

    // Change qty display before adding to cart
    function changeDisplayQty(id, delta) {
        const span = document.getElementById(`display-qty-${id}`);
        let current = parseInt(span.innerText);
        current += delta;
        if(current < 1) current = 1;
        span.innerText = current;
    }

    function addToCart(name, price, id) {
        const qty = parseInt(document.getElementById(`display-qty-${id}`).innerText);
        
        // Check if item exists, update it, or add new
        const existing = cart.find(item => item.name === name);
        if(existing) {
            existing.qty += qty;
        } else {
            cart.push({ name, price, qty });
        }
        
        // Reset display to 1 for next pick
        document.getElementById(`display-qty-${id}`).innerText = "1";
        updateCartUI();
    }

    function clearCart() {
        cart = [];
        document.getElementById('cart-bar').style.display = 'none';
        updateCartUI();
    }

    function updateCartUI() {
        const cartBar = document.getElementById('cart-bar');
        const cartCount = document.getElementById('cart-count');
        const cartTotal = document.getElementById('cart-total');
        const checkoutBtn = document.getElementById('whatsapp-checkout');

        if (cart.length > 0) cartBar.style.display = 'flex';

        let total = 0;
        let count = 0;
        let summary = "Hello! I want to order:\n\n";
        
        cart.forEach((item) => {
            const itemTotal = item.price * item.qty;
            total += itemTotal;
            count += item.qty;
            summary += `• ${item.name} (Qty: ${item.qty}) - ₦${itemTotal.toLocaleString()}\n`;
        });

        summary += `\n*TOTAL AMOUNT: ₦${total.toLocaleString()}*`;
        
        cartCount.innerText = count;
        cartTotal.innerText = total.toLocaleString();
        checkoutBtn.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(summary)}`;
    }

    async function fetchDresses() {
        try {
            const response = await fetch(`https://${PROJECT_ID}.api.sanity.io/v2021-10-21/data/query/${DATASET}?query=${encodeURIComponent('*[_type == "product"]{_id, name, price, "imageUrl": image.asset->url}')}`);
            const data = await response.json();
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = ""; 

            data.result.forEach(dress => {
                const cleanId = dress._id.replace(/[^a-zA-Z0-9]/g, '');
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${dress.imageUrl}" alt="${dress.name}">
                        <h3>${dress.name}</h3>
                        <span class="price-tag">₦${dress.price.toLocaleString()}</span>
                        
                        <div class="qty-box">
                            <button class="qty-btn" onclick="changeDisplayQty('${cleanId}', -1)">-</button>
                            <span id="display-qty-${cleanId}">1</span>
                            <button class="qty-btn" onclick="changeDisplayQty('${cleanId}', 1)">+</button>
                        </div>
                        
                        <button class="add-btn" onclick="addToCart('${dress.name}', ${dress.price}, '${cleanId}')">Add to Order</button>
                    </div>`;
            });
        } catch (e) { document.getElementById('loading').innerText = "Error loading shop."; }
    }

    fetchDresses();
</script>

</body>
</html>
