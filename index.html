<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAY COLLECTION | PREMIUM</title>
    <style>
        :root {
            --primary-green: #006400; /* Deep Forest Green */
            --light-green: #e8f5e9;
            --white: #ffffff;
            --text-dark: #1a1a1a;
            --text-muted: #666666;
            --border: #e0e0e0;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            background: #f9f9f9; 
            color: var(--text-dark);
            padding-bottom: 220px; 
            scroll-behavior: smooth;
        }

        header { 
            padding: 40px 20px; 
            text-align: center; 
            background: var(--white);
            border-bottom: 1px solid var(--border);
        }

        header h1 { 
            margin: 0; 
            font-size: 26px; 
            letter-spacing: 4px; 
            font-weight: 700; 
            color: var(--primary-green);
            text-transform: uppercase;
        }

        .action-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .helper-launcher, .gift-launcher {
            padding: 10px 15px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1.5px solid var(--primary-green);
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
        }

        .helper-launcher { background: var(--primary-green); color: white; }
        .gift-launcher { background: transparent; color: var(--primary-green); }
        .gift-launcher:hover { background: var(--light-green); }

        /* Modal Styles */
        #helperModal, #giftModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 20000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--white);
            padding: 30px;
            width: 85%;
            max-width: 380px;
            border-radius: 8px;
            text-align: center;
        }

        .modal-content h2 { color: var(--primary-green); font-size: 18px; margin-bottom: 20px; text-transform: uppercase; }
        .modal-content input, .modal-content select {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: #fff; border: 1px solid var(--border); color: #333;
            box-sizing: border-box; border-radius: 5px;
        }

        .close-modal { color: var(--text-muted); cursor: pointer; display: block; margin-top: 15px; font-size: 12px; text-transform: uppercase; }

        /* Filter Section */
        .filter-wrapper {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px; border-bottom: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 10px; align-items: center;
        }

        #searchInput { width: 90%; max-width: 500px; border-radius: 8px; background: #fff; border: 1px solid var(--border); padding: 12px 15px; outline: none; }
        .price-inputs { display: flex; gap: 10px; width: 90%; max-width: 500px; }
        .price-inputs input { width: 50%; background: #fff; border: 1px solid var(--border); padding: 10px; border-radius: 5px; }

        /* Product Grid */
        #shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        
        .product-card { 
            background: var(--white); 
            border: 1px solid var(--border); 
            border-radius: 8px;
            overflow: hidden; 
            position: relative; 
            transition: transform 0.2s; 
        }
        
        .badge { position: absolute; top: 10px; left: 10px; background: var(--primary-green); color: white; font-size: 9px; font-weight: bold; padding: 4px 8px; z-index: 10; border-radius: 2px; }
        
        .img-container { width: 100%; height: 200px; overflow: hidden; background: #f0f0f0; }
        .product-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .details { padding: 12px; text-align: left; }
        .details h3 { font-size: 12px; text-transform: capitalize; color: var(--text-dark); margin: 0 0 5px; }
        .price { font-size: 15px; color: var(--primary-green); font-weight: bold; margin-bottom: 10px; display: block; }
        
        select { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 11px; }

        .qty-box { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--light-green); 
            padding: 5px 10px; 
            margin-bottom: 10px; 
            border-radius: 4px;
        }
        .qty-box button { background: none; border: none; color: var(--primary-green); font-size: 20px; cursor: pointer; font-weight: bold; }
        .qty-box span { font-weight: bold; font-size: 14px; }
        
        .add-btn { 
            width: 100%; 
            background: var(--primary-green); 
            color: white; 
            border: none; 
            padding: 12px; 
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 11px; 
            cursor: pointer; 
            border-radius: 4px;
        }

        /* Order Bar */
        .order-bar { 
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            max-width: 500px; 
            background: var(--white); 
            padding: 20px; 
            z-index: 10000; 
            border-radius: 12px;
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            border: 1px solid var(--primary-green);
        }
        
        .order-info { display: flex; justify-content: space-between; font-weight: bold; font-size: 15px; color: var(--primary-green); }
        
        .buy-now { 
            background: var(--primary-green); 
            color: #fff; 
            text-align: center; 
            text-decoration: none; 
            padding: 15px; 
            font-weight: bold; 
            font-size: 14px; 
            border-radius: 6px;
        }

        footer { 
            text-align: center; 
            padding: 40px 20px; 
            font-size: 11px; 
            color: var(--text-muted); 
            background: var(--white);
            border-top: 1px solid var(--border); 
            margin-top: 40px; 
        }
        
        footer a { 
            color: var(--primary-green); 
            text-decoration: none; 
            font-weight: bold; 
            border: 1px solid var(--primary-green);
            padding: 4px 8px;
            margin-top: 10px;
            display: inline-block;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<header>
    <h1>GRAY COLLECTION</h1>
    <div class="action-row">
        <button class="helper-launcher" onclick="openModal('helperModal')">✨ Style Helper</button>
        <button class="gift-launcher" onclick="openModal('giftModal')">🎁 Appreciate CEO</button>
    </div>
</header>

<div id="helperModal">
    <div class="modal-content">
        <h2>Style Concierge</h2>
        <input type="text" id="hHeight" placeholder="Your Height">
        <select id="hSize">
            <option value="">Choose Size</option>
            <option value="S">Small</option>
            <option value="M">Medium</option>
            <option value="L">Large</option>
            <option value="XL">XL</option>
        </select>
        <select id="hBody">
            <option value="">Body Type</option>
            <option value="Slim">Slim</option>
            <option value="Normal">Normal</option>
            <option value="Curvy">Curvy</option>
        </select>
        <button class="add-btn" onclick="sendHelperRequest()">Get Advice</button>
        <span class="close-modal" onclick="closeModal('helperModal')">Close</span>
    </div>
</div>

<div id="giftModal">
    <div class="modal-content">
        <h2>Appreciate CEO</h2>
        <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 15px;">Choose an amount to gift Tobi Gray</p>
        <select id="giftAmount">
            <option value="₦2,000">₦2,000</option>
            <option value="₦5,000">₦5,000</option>
            <option value="₦10,000">₦10,000</option>
            <option value="₦20,000">₦20,000</option>
            <option value="Custom Amount">Custom Amount</option>
        </select>
        <input type="text" id="customGift" placeholder="Enter custom amount" style="display:none;">
        <button class="add-btn" onclick="sendGift()">Send Gift Message</button>
        <span class="close-modal" onclick="closeModal('giftModal')">Maybe Later</span>
    </div>
</div>

<div class="filter-wrapper">
    <input type="text" id="searchInput" placeholder="Search our collection..." onkeyup="applyFilters()">
    <div class="price-inputs">
        <input type="number" id="minPrice" placeholder="Min ₦" onkeyup="applyFilters()">
        <input type="number" id="maxPrice" placeholder="Max ₦" onkeyup="applyFilters()">
    </div>
</div>

<div id="shop-grid"><p style="text-align: center; width: 100%; color: var(--text-muted);">Curating Luxury...</p></div>

<div class="order-bar" id="order-bar" style="display: none;">
    <div class="order-info">
        <span>Cart (<span id="cart-count">0</span> Items)</span>
        <span>Total: ₦<span id="cart-total">0</span></span>
    </div>
    <a href="#" class="buy-now" id="wa-link" target="_blank">ORDER VIA WHATSAPP</a>
</div>

<footer>
    Created by <b>KELVIN THE DESIGNER</b> &copy; 2026<br>
    <a href="https://wa.me/2349032320783?text=Hello%20Kelvin!%20I%20saw%20your%20design%20on%20Gray%20Collection%20and%20I%20want%20to%20work%20with%20you.">CONTACT THE DESIGNER</a>
</footer>

<script>
    const PROJECT_ID = "q044uw50";
    const DATASET = "production";
    const WHATSAPP_NUMBER = "2349133269825"; 

    let cartData = [];
    let allProducts = []; 

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    document.getElementById('giftAmount').addEventListener('change', function() {
        document.getElementById('customGift').style.display = (this.value === 'Custom Amount') ? 'block' : 'none';
    });

    function sendGift() {
        let amt = document.getElementById('giftAmount').value;
        if(amt === 'Custom Amount') amt = document.getElementById('customGift').value;
        if(!amt) { alert("Please select or enter an amount"); return; }
        const msg = `Hello Tobi Gray! 💖\n\nI really appreciate your collection and I want to gift you ${amt}. Please let me know how to send it!`;
        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
        closeModal('giftModal');
    }

    function sendHelperRequest() {
        const h = document.getElementById('hHeight').value;
        const s = document.getElementById('hSize').value;
        const b = document.getElementById('hBody').value;
        const msg = `Hello GRAY COLLECTION! I need help.\nHeight: ${h}\nSize: ${s}\nBody: ${b}\nWhat do you recommend?`;
        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
        closeModal('helperModal');
    }

    function adjustQty(id, amount) {
        let d = document.getElementById(`qty-num-${id}`);
        let c = parseInt(d.innerText) + amount;
        d.innerText = c < 1 ? 1 : c;
    }

    function addItemToCart(name, price, id) {
        const q = parseInt(document.getElementById(`qty-num-${id}`).innerText);
        const s = document.getElementById(`size-${id}`)?.value || "Default";
        
        const existingItem = cartData.find(i => i.name === name && i.size === s);
        if(existingItem) {
            existingItem.qty += q;
        } else {
            cartData.push({ name, price, qty: q, size: s });
        }
        
        alert(q + " item(s) added to cart!");
        refreshOrderBar();
    }

    function refreshOrderBar() {
        const bar = document.getElementById('order-bar');
        if (cartData.length > 0) bar.style.display = 'flex';
        
        let grand = 0; let count = 0;
        let msg = "Hello Gray Collection! I want to order:\n\n";
        
        cartData.forEach(i => {
            const lineTotal = i.price * i.qty;
            grand += lineTotal; 
            count += i.qty;
            msg += `• ${i.name} (Qty: ${i.qty}) - Size: ${i.size}\n`;
        });
        
        document.getElementById('cart-count').innerText = count;
        document.getElementById('cart-total').innerText = grand.toLocaleString();
        document.getElementById('wa-link').href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg + "\nTotal: ₦" + grand.toLocaleString())}`;
    }

    function applyFilters() {
        const t = document.getElementById('searchInput').value.toLowerCase();
        const min = parseFloat(document.getElementById('minPrice').value) || 0;
        const max = parseFloat(document.getElementById('maxPrice').value) || Infinity;
        
        const cards = document.querySelectorAll('.product-card');
        allProducts.forEach((p, i) => {
            const match = p.name.toLowerCase().includes(t) && p.price >= min && p.price <= max;
            cards[i].style.display = match ? 'block' : 'none';
        });
    }

    async function getProducts() {
        try {
            const res = await fetch(`https://${PROJECT_ID}.api.sanity.io/v2021-10-21/data/query/${DATASET}?query=${encodeURIComponent('*[_type == "product"] | order(_createdAt desc){_id, name, price, sizes, "imageUrl": image.asset->url}')}`);
            const json = await res.json();
            allProducts = json.result; 
            const grid = document.getElementById('shop-grid'); 
            grid.innerHTML = ""; 
            
            allProducts.forEach((p, idx) => {
                const id = p._id.replace(/[^a-zA-Z0-9]/g, '');
                const sizeOptions = p.sizes ? p.sizes.split(',').map(x => `<option value="${x.trim()}">${x.trim()}</option>`).join('') : '<option value="Standard">Standard Size</option>';
                
                grid.innerHTML += `
                <div class="product-card">
                    ${idx < 4 ? '<div class="badge">NEW ARRIVAL</div>' : ''}
                    <div class="img-container"><img src="${p.imageUrl}"></div>
                    <div class="details">
                        <h3>${p.name}</h3>
                        <span class="price">₦${p.price.toLocaleString()}</span>
                        <select id="size-${id}">${sizeOptions}</select>
                        <div class="qty-box">
                            <button onclick="adjustQty('${id}',-1)">-</button>
                            <span id="qty-num-${id}">1</span>
                            <button onclick="adjustQty('${id}',1)">+</button>
                        </div>
                        <button class="add-btn" onclick="addItemToCart('${p.name}', ${p.price}, '${id}')">Add to Order</button>
                    </div>
                </div>`;
            });
        } catch (e) { 
            console.log(e);
            document.getElementById('shop-grid').innerHTML = "Failed to load products.";
        }
    }
    getProducts();
</script>
</body>
</html>
