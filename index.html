<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAY COLLECTION | PREMIUM</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --gold: #d4af37;
            --text: #ffffff;
            --muted: #a0a0a0;
            --border: #333333;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text);
            padding-bottom: 220px; 
            scroll-behavior: smooth;
        }

        header { 
            padding: 40px 20px; 
            text-align: center; 
            background: linear-gradient(to bottom, #1a1a1a, #0f0f0f);
        }

        header h1 { 
            margin: 0; 
            font-size: 28px; 
            letter-spacing: 6px; 
            font-weight: 200; 
            color: var(--gold);
            text-transform: uppercase;
        }

        .action-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .helper-launcher, .gift-launcher {
            padding: 10px 15px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--gold);
            cursor: pointer;
            border-radius: 4px;
        }

        .helper-launcher { background: var(--gold); color: black; }
        .gift-launcher { background: transparent; color: var(--gold); }

        #helperModal, #giftModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 20000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            width: 85%;
            max-width: 380px;
            border: 1px solid var(--gold);
            text-align: center;
        }

        .modal-content h2 { color: var(--gold); font-size: 18px; margin-bottom: 20px; text-transform: uppercase; }
        .modal-content input, .modal-content select {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: #000; border: 1px solid var(--border); color: white;
            box-sizing: border-box;
        }

        .close-modal { color: var(--muted); cursor: pointer; display: block; margin-top: 15px; font-size: 12px; text-transform: uppercase; }

        .filter-wrapper {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(15px);
            padding: 20px; border-bottom: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 15px; align-items: center;
        }

        #searchInput { width: 90%; max-width: 500px; border-radius: 30px; background: #222; border: 1px solid var(--border); color: white; padding: 12px 20px; outline: none; }
        .price-inputs { display: flex; gap: 10px; width: 90%; max-width: 500px; }
        .price-inputs input { width: 50%; background: #222; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 5px; }

        #shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; padding: 20px; }
        .product-card { background: var(--card-bg); border: 1px solid var(--border); overflow: hidden; position: relative; transition: 0.3s; }
        .badge { position: absolute; top: 10px; left: 10px; background: var(--gold); color: black; font-size: 9px; font-weight: bold; padding: 4px 8px; z-index: 10; }
        .img-container { width: 100%; height: 240px; overflow: hidden; border-bottom: 2px solid var(--gold); }
        .product-card img { width: 100%; height: 100%; object-fit: cover; }
        .details { padding: 12px; }
        .details h3 { font-size: 11px; text-transform: uppercase; color: var(--muted); margin: 0 0 8px; letter-spacing: 1px; }
        .price { font-size: 16px; color: var(--gold); font-weight: bold; margin-bottom: 12px; display: block; }
        
        .qty-box { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 4px; margin-bottom: 12px; border: 1px solid var(--border); }
        .qty-box button { background: none; border: none; color: var(--gold); font-size: 18px; cursor: pointer; }
        
        .add-btn { width: 100%; background: var(--gold); color: #000; border: none; padding: 12px; font-weight: bold; text-transform: uppercase; font-size: 10px; cursor: pointer; }

        .order-bar { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: var(--gold); padding: 15px; z-index: 10000; color: #000; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .buy-now { background: #000; color: #fff; text-align: center; text-decoration: none; padding: 14px; font-weight: bold; font-size: 14px; }

        footer { 
            text-align: center; 
            padding: 40px 20px; 
            font-size: 11px; 
            color: var(--muted); 
            letter-spacing: 1px; 
            border-top: 1px solid var(--border); 
            margin-top: 40px; 
            line-height: 1.8;
        }
        
        footer a { 
            color: var(--gold); 
            text-decoration: none; 
            font-weight: bold; 
            border: 1px solid var(--gold);
            padding: 4px 8px;
            margin-left: 5px;
            display: inline-block;
            border-radius: 3px;
            transition: 0.3s;
        }

        footer a:hover {
            background: var(--gold);
            color: black;
        }
    </style>
</head>
<body>

<header>
    <h1>GRAY COLLECTION</h1>
    <div class="action-row">
        <button class="helper-launcher" onclick="openModal('helperModal')">✨ Style Helper</button>
        <button class="gift-launcher" onclick="openModal('giftModal')">🎁 Appreciate Tobi Gray</button>
    </div>
</header>

<div id="helperModal">
    <div class="modal-content">
        <h2>Style Concierge</h2>
        <input type="text" id="hHeight" placeholder="Height">
        <select id="hSize">
            <option value="">Choose Size</option>
            <option value="S">Small</option>
            <option value="M">Medium</option>
            <option value="L">Large</option>
            <option value="XL">XL</option>
        </select>
        <select id="hBody">
            <option value="">Body Type</option>
            <option value="Slim">Slim</option>
            <option value="Normal">Normal</option>
            <option value="Curvy">Curvy</option>
        </select>
        <button class="add-btn" onclick="sendHelperRequest()">Get Advice</button>
        <span class="close-modal" onclick="closeModal('helperModal')">Close</span>
    </div>
</div>

<div id="giftModal">
    <div class="modal-content">
        <h2>Appreciate Tobi Gray</h2>
        <p style="font-size: 12px; color: var(--muted); margin-bottom: 15px;">Choose an amount to gift the CEO</p>
        <select id="giftAmount">
            <option value="₦2,000">₦2,000</option>
            <option value="₦5,000">₦5,000</option>
            <option value="₦10,000">₦10,000</option>
            <option value="₦20,000">₦20,000</option>
            <option value="Custom Amount">Custom Amount</option>
        </select>
        <input type="text" id="customGift" placeholder="Enter custom amount" style="display:none;">
        <button class="add-btn" onclick="sendGift()">Send Gift Message</button>
        <span class="close-modal" onclick="closeModal('giftModal')">Maybe Later</span>
    </div>
</div>

<div class="filter-wrapper">
    <input type="text" id="searchInput" placeholder="SEARCH PIECES..." onkeyup="applyFilters()">
    <div class="price-inputs">
        <input type="number" id="minPrice" placeholder="MIN ₦" onkeyup="applyFilters()">
        <input type="number" id="maxPrice" placeholder="MAX ₦" onkeyup="applyFilters()">
    </div>
</div>

<div id="shop-grid"><p style="text-align: center; width: 100%;">Loading Luxury...</p></div>

<div class="order-bar" id="order-bar" style="display: none;">
    <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 13px;">
        <span>Cart (<span id="cart-count">0</span>)</span>
        <span>Total: ₦<span id="cart-total">0</span></span>
    </div>
    <a href="#" class="buy-now" id="wa-link" target="_blank">ORDER VIA WHATSAPP</a>
</div>

<footer>
    Created by <b>KELVIN THE DESIGNER</b> copyright ©️ 2026<br>
    <a href="https://wa.me/2349032320783?text=Hello%20Kelvin!%20I%20saw%20your%20design%20on%20Gray%20Collection%20and%20I%20want%20to%20work%20with%20you.">CONTACT THE DESIGNER</a>
</footer>

<script>
    const PROJECT_ID = "q044uw50";
    const DATASET = "production";
    const WHATSAPP_NUMBER = "2349133269825"; 

    let cartData = [];
    let allProducts = []; 

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    document.getElementById('giftAmount').addEventListener('change', function() {
        document.getElementById('customGift').style.display = (this.value === 'Custom Amount') ? 'block' : 'none';
    });

    function sendGift() {
        let amt = document.getElementById('giftAmount').value;
        if(amt === 'Custom Amount') amt = document.getElementById('customGift').value;
        if(!amt) { alert("Please select or enter an amount"); return; }
        const msg = `Hello Tobi Gray! 💖\n\nI really appreciate your collection and I want to gift you ${amt}. Please let me know how to send it!`;
        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
        closeModal('giftModal');
    }

    function sendHelperRequest() {
        const h = document.getElementById('hHeight').value;
        const s = document.getElementById('hSize').value;
        const b = document.getElementById('hBody').value;
        const msg = `Hello GRAY COLLECTION! I need help.\nHeight: ${h}\nSize: ${s}\nBody: ${b}\nWhat do you recommend?`;
        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
        closeModal('helperModal');
    }

    function adjustQty(id, amount) {
        let d = document.getElementById(`qty-num-${id}`);
        let c = parseInt(d.innerText) + amount;
        d.innerText = c < 1 ? 1 : c;
    }

    function addItemToCart(name, price, id) {
        const q = parseInt(document.getElementById(`qty-num-${id}`).innerText);
        const s = document.getElementById(`size-${id}`)?.value || "N/A";
        const c = document.getElementById(`color-${id}`)?.value || "N/A";
        const item = cartData.find(i => i.name === name && i.size === s);
        if(item) item.qty += q; else cartData.push({ name, price, qty: q, size: s, color: c });
        refreshOrderBar();
    }

    function refreshOrderBar() {
        const bar = document.getElementById('order-bar');
        if (cartData.length > 0) bar.style.display = 'flex';
        let grand = 0; let count = 0;
        let msg = "Order Details:\n";
        cartData.forEach(i => {
            grand += (i.price * i.qty); count += i.qty;
            msg += `• ${i.name} (${i.qty}) - ${i.size}\n`;
        });
        document.getElementById('cart-count').innerText = count;
        document.getElementById('cart-total').innerText = grand.toLocaleString();
        document.getElementById('wa-link').href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg + "\nTotal: ₦" + grand.toLocaleString())}`;
    }

    function applyFilters() {
        const t = document.getElementById('searchInput').value.toLowerCase();
        const min = parseFloat(document.getElementById('minPrice').value) || 0;
        const max = parseFloat(document.getElementById('maxPrice').value) || Infinity;
        allProducts.forEach((p, i) => {
            const match = p.name.toLowerCase().includes(t) && p.price >= min && p.price <= max;
            document.querySelectorAll('.product-card')[i].style.display = match ? 'block' : 'none';
        });
    }

    async function getProducts() {
        try {
            const res = await fetch(`https://${PROJECT_ID}.api.sanity.io/v2021-10-21/data/query/${DATASET}?query=${encodeURIComponent('*[_type == "product"] | order(_createdAt desc){_id, name, price, colors, sizes, "imageUrl": image.asset->url}')}`);
            const json = await res.json();
            allProducts = json.result; 
            const grid = document.getElementById('shop-grid'); grid.innerHTML = ""; 
            allProducts.forEach((p, idx) => {
                const id = p._id.replace(/[^a-zA-Z0-9]/g, '');
                const s = p.sizes ? p.sizes.split(',').map(x => `<option>${x.trim()}</option>`).join('') : '';
                grid.innerHTML += `<div class="product-card">
                    ${idx < 4 ? '<div class="badge">NEW</div>' : ''}
                    <div class="img-container"><img src="${p.imageUrl}"></div>
                    <div class="details">
                        <h3>${p.name}</h3>
                        <span class="price">₦${p.price.toLocaleString()}</span>
                        ${p.sizes ? `<select id="size-${id}">${s}</select>` : ''}
                        <div class="qty-box"><button onclick="adjustQty('${id}',-1)">-</button><span id="qty-num-${id}">1</span><button onclick="adjustQty('${id}',1)">+</button></div>
                        <button class="add-btn" onclick="addItemToCart('${p.name}', ${p.price}, '${id}')">Add to Order</button>
                    </div>
                </div>`;
            });
        } catch (e) { console.log(e); }
    }
    getProducts();
</script>
</body>
</html>
